  # ===== ARTIFACT REGISTRY =====
  _AR_HOSTNAME: asia-southeast1-docker.pkg.dev
  _AR_PROJECT_ID: uctalent-dev
  _AR_REPOSITORY: cloud-run-source-deploy

  # ===== APPLICATION =====
  _NODE_ENV: production
  _PORT: '3001'
  _ALLOWED_ORIGIN: https://ucsmile.com
  _AUTO_RUN_MIGRATIONS: 'true'

  # ===== GOOGLE SHEET =====
  _GOOGLE_SHEET_ID: 1AzurV8LSEbIleaFQ4Rzd9WXAtthF8cgC_tWw9fl3Lvw
  _GOOGLE_SHEET_GID: '1339217413'

  # ===== SECRET JSON =====
  # Expected JSON keys: DATABASE_URL, GEMINI_API_KEY, ADMIN_SECRET_KEY
  _SECRET_JSON_NAME: uc-smile-api-env-dev

tags:
  - deploy-to-vps
  - uc-smile-api
